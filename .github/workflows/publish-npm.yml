name: Publish CLI to npm

on:
  push:
    tags:
      - "v*"

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Publish @zanetta/antigravity4cursor
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Resolve version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if [ -z "$VERSION" ]; then
            echo "Invalid tag: $TAG (expected format v1.2.3)" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION (from tag $TAG)"

      - name: Sync CLI package version
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --workspace=@zanetta/antigravity4cursor

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish to npm
        run: npm publish --workspace=@zanetta/antigravity4cursor --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
